name: ClassicPress Coding Standards (CPCS)

on: [pull_request, push]

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    phpcs:
        name: CPCS
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Set up PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: "8.3"
                  tools: composer

            - name: Install PHPCS + standards
              run: |
                  composer global config --no-plugins allow-plugins.dealerdirect/phpcodesniffer-composer-installer true

                  composer global require squizlabs/php_codesniffer:^3.9
                  composer global require dealerdirect/phpcodesniffer-composer-installer
                  composer global require wp-coding-standards/wpcs
                  composer global require classicpress/cpcs

                  echo "$HOME/.composer/vendor/bin" >> $GITHUB_PATH

            - name: Verify install
              run: phpcs -i

            - name: Run PHPCS
              run: phpcs --standard=phpcs.xml.dist --report-full --report-summary
