name: ClassicPress Directory Coding Standard checks.

on: [pull_request, push]

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    phpcs:
        name: CPCS
        runs-on: ubuntu-latest
        env:
            FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        steps:
            - uses: actions/checkout@v6
            - name: CPCS get rules
              run: |
                  wget -O phpcs.xml https://raw.githubusercontent.com/ClassicPress/ClassicPress-Coding-Standards/main/phpcs.xml
                  sed -i '/^\t<!-- start config -->.*/a\
                    <file>.</file>
                    ' phpcs.xml
                  sed -i '/MY_DOMAIN/ s//fx-shortcodes/' phpcs.xml
                  sed -i 's|<\/ruleset>|    <config name="testVersion" value="8.0-"/>\n</ruleset>|' phpcs.xml
                  cp phpcs.xml phpcs.xml.dist
            - name: CPCS checks
              uses: 10up/wpcs-action@v1.7.0
              with:
                  use_local_config: "true"
                  enable_warnings: "true"
                  php_version: "8.1"
                  extra_args: "--report-json=./phpcs.json"
            - name: Set up Node.js for summary
              if: always()
              uses: actions/setup-node@v6
              with:
                  node-version: "24"
            - name: Update summary
              if: always()
              run: |
                  npm i -g github:10up/phpcs-json-to-md
                  phpcs-json-to-md --path ./phpcs.json --output ./phpcs.md
                  cat phpcs.md >> $GITHUB_STEP_SUMMARY
